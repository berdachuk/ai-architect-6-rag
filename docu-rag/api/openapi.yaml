openapi: 3.0.3
info:
  title: DocuRAG REST API
  description: |
    Medical document RAG system — Spring Boot Modulith.
    
    ## Architecture Overview
    Documents are ingested (PDF or structured JSONL/CSV), stored as source documents,
    chunked into passages, and embedded into a pgvector store for semantic search.
    
    ## Typical Flow
    1. **Ingest** documents via `POST /api/documents/ingest`
    2. **Build index** via `POST /api/index/rebuild`
    3. **Query** via `POST /api/rag/ask`
    
    E2E client source of truth — keep aligned with controllers under `com.berdachuk.docurag.web.rest`.
  version: 0.1.0
servers:
  - url: http://localhost:8084
    description: Local default
  - url: http://localhost:18080
    description: Local E2E / stub-AI profile

tags:
  - name: documents
    description: Document ingestion, storage, and catalog management
  - name: index
    description: Index rebuild operations and status monitoring
  - name: rag
    description: Retrieval-Augmented Generation queries and document analysis
  - name: evaluation
    description: RAG quality evaluation against ground-truth datasets
  - name: visualizations
    description: Chart and graph data for document analytics
  - name: actuator
    description: Spring Boot Actuator endpoints

paths:
  /api/documents/ingest:
    post:
      tags: [documents]
      summary: Ingest documents from specified paths
      description: |
        Ingests documents from file paths or directories. Supports PDF files and
        structured formats (JSONL, CSV). Documents are parsed, deduplicated by content hash,
        and stored. For PDF files, text is extracted directly. For structured files, each
        record is treated as a separate document. After ingestion, use /api/index/rebuild
        to create chunks and embeddings.
      operationId: ingestDocuments
      requestBody:
        description: Paths to files or directories to ingest
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestPathsRequest'
      responses:
        '200':
          description: Ingest completed — returns job summary with loaded/skipped counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestSummary'

  /api/documents:
    get:
      tags: [documents]
      summary: List ingested documents
      description: Returns a paginated list of all ingested source documents with their metadata.
      operationId: listDocuments
      parameters:
        - name: page
          in: query
          description: Page number (zero-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of document summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceDocumentSummary'

  /api/documents/{id}:
    get:
      tags: [documents]
      summary: Get document by ID
      description: Returns full document details including content for the specified document.
      operationId: getDocumentById
      parameters:
        - name: id
          in: path
          required: true
          description: Document ID
          schema:
            type: string
      responses:
        '200':
          description: Full document detail including content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceDocumentDetail'
        '404':
          description: Document not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/documents/categories:
    get:
      tags: [documents]
      summary: List all document categories
      description: Returns a list of all distinct category values used by ingested documents.
      operationId: listDocumentCategories
      responses:
        '200':
          description: Distinct category strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/index/rebuild:
    post:
      tags: [index]
      summary: Trigger full index rebuild
      description: |
        Triggers a complete index rebuild: clears all existing chunks and embeddings,
        re-chunks all source documents, and regenerates embeddings. This is an
        asynchronous operation. Poll /api/index/status to monitor progress.
      operationId: rebuildIndex
      responses:
        '202':
          description: Rebuild started asynchronously

  /api/index/incremental:
    post:
      tags: [index]
      summary: Incremental index update
      description: Currently not implemented. Use /api/index/rebuild for full rebuild.
      operationId: incrementalIndex
      responses:
        '501':
          description: Not implemented

  /api/index/status:
    get:
      tags: [index]
      summary: Get index and ingest status
      description: Returns current state of the index including document/chunk counts and last ingest job info.
      operationId: getIndexStatus
      responses:
        '200':
          description: Index statistics and last ingest job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexStatus'

  /api/rag/ask:
    post:
      tags: [rag]
      summary: Ask a question (RAG)
      description: |
        Executes a Retrieval-Augmented Generation query: embeds the question,
        retrieves top-K similar chunks, and generates an answer using the LLM.
      operationId: ragAsk
      requestBody:
        description: Question and retrieval parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagAskRequest'
      responses:
        '200':
          description: Answer with retrieved source chunks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagAskResponse'
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/rag/analyze:
    post:
      tags: [rag]
      summary: Analyze documents (extraction)
      description: Extracts structured information from documents using the LLM without retrieval.
      operationId: ragAnalyze
      requestBody:
        description: Analysis parameters
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
      responses:
        '200':
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'

  /api/evaluation/run:
    post:
      tags: [evaluation]
      summary: Run evaluation on a dataset
      description: |
        Runs evaluation against a built-in or custom dataset. Measures RAG quality
        using ground-truth questions and expected answers. Returns aggregate metrics.
      operationId: runEvaluation
      requestBody:
        description: Evaluation parameters and dataset
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRunRequest'
      responses:
        '200':
          description: Evaluation run started and completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunStartedResponse'
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Cannot run in current system state
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/evaluation/runs:
    get:
      tags: [evaluation]
      summary: List all evaluation runs
      description: Returns summaries of all past evaluation runs.
      operationId: listEvaluationRuns
      responses:
        '200':
          description: List of evaluation run summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluationRunSummary'

  /api/evaluation/runs/{id}:
    get:
      tags: [evaluation]
      summary: Get evaluation run by ID
      description: Returns detailed results for a specific evaluation run including per-case metrics.
      operationId: getEvaluationRun
      parameters:
        - name: id
          in: path
          required: true
          description: Run ID
          schema:
            type: string
      responses:
        '200':
          description: Detailed run results with per-case rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunDetail'
        '404':
          description: Run not found

  /api/evaluation/latest:
    get:
      tags: [evaluation]
      summary: Get latest evaluation run
      description: Returns the most recent evaluation run details.
      operationId: getLatestEvaluation
      responses:
        '200':
          description: Latest evaluation run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunDetail'
        '404':
          description: No runs exist yet

  /api/visualizations/categories/pie:
    get:
      tags: [visualizations]
      summary: Get document categories pie chart data
      description: Returns aggregated category distribution as pie chart data.
      operationId: getCategoriesPie
      responses:
        '200':
          description: Pie chart slices for document categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PieChartResponse'

  /api/visualizations/entities/graph:
    get:
      tags: [visualizations]
      summary: Get entity relationship graph data
      description: Returns nodes and edges representing extracted entities and their relationships.
      operationId: getEntitiesGraph
      responses:
        '200':
          description: Graph visualization data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphVisualizationResponse'

  /actuator/health:
    get:
      tags: [actuator]
      summary: Application health check
      description: Standard Spring Boot Actuator health endpoint.
      operationId: getHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  schemas:
    IngestPathsRequest:
      type: object
      properties:
        paths:
          type: array
          items:
            type: string

    IngestSummary:
      type: object
      properties:
        jobId:
          type: string
        documentsLoaded:
          type: integer
          format: int32
        documentsSkipped:
          type: integer
          format: int32
        status:
          type: string
        errorMessage:
          type: string
          nullable: true

    SourceDocumentSummary:
      type: object
      properties:
        id:
          type: string
        externalId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        sourceFormat:
          type: string
          nullable: true

    SourceDocumentDetail:
      type: object
      properties:
        id:
          type: string
        externalId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        sourceName:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        content:
          type: string
          nullable: true
        sourceFormat:
          type: string
          nullable: true

    IndexStatus:
      type: object
      properties:
        documentCount:
          type: integer
          format: int64
        chunkCount:
          type: integer
          format: int64
        embeddedChunkCount:
          type: integer
          format: int64
        lastIngestJobId:
          type: string
          nullable: true
        lastIngestStatus:
          type: string
          nullable: true
        lastIngestStartedAt:
          type: string
          format: date-time
          nullable: true
        lastIngestFinishedAt:
          type: string
          format: date-time
          nullable: true

    RagAskRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        topK:
          type: integer
          format: int32
        minScore:
          type: number
          format: double

    RetrievedChunkDto:
      type: object
      properties:
        documentId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        score:
          type: number
          format: double
        snippet:
          type: string
          nullable: true

    RagAskResponse:
      type: object
      properties:
        answer:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        retrievedChunks:
          type: array
          items:
            $ref: '#/components/schemas/RetrievedChunkDto'

    AnalysisRequest:
      type: object
      properties:
        maxDocuments:
          type: integer
          format: int32
          nullable: true

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
          format: int64

    AnalysisGraphNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
          nullable: true
        type:
          type: string
          nullable: true

    AnalysisGraphEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        relation:
          type: string
          nullable: true

    AnalysisResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryCount'
        graphNodes:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisGraphNode'
        graphEdges:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisGraphEdge'
        extractionNotes:
          type: string
          nullable: true

    EvaluationRunRequest:
      type: object
      required: [datasetName]
      properties:
        datasetName:
          type: string
        topK:
          type: integer
          format: int32
          minimum: 1
        minScore:
          type: number
          format: double
          minimum: 0
          maximum: 1
        semanticPassThreshold:
          type: number
          format: double
          minimum: 0
          maximum: 1

    EvaluationRunStartedResponse:
      type: object
      properties:
        runId:
          type: string
        total:
          type: integer
          format: int32
        normalizedAccuracy:
          type: number
          format: double
        meanSemanticSimilarity:
          type: number
          format: double
        semanticAccuracy:
          type: number
          format: double
        semanticPassThreshold:
          type: number
          format: double
        semanticAccuracyAt080:
          type: number
          format: double

    EvaluationRunSummary:
      type: object
      properties:
        id:
          type: string
        datasetId:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        modelName:
          type: string
          nullable: true
        embeddingModelName:
          type: string
          nullable: true
        normalizedAccuracy:
          type: number
          nullable: true
        meanSemanticSimilarity:
          type: number
          nullable: true
        semanticAccuracy:
          type: number
          nullable: true
        semanticPassThreshold:
          type: number
          nullable: true
        semanticAccuracyAt080:
          type: number
          nullable: true

    EvaluationCaseResult:
      type: object
      properties:
        caseId:
          type: string
        question:
          type: string
          nullable: true
        groundTruth:
          type: string
          nullable: true
        predictedAnswer:
          type: string
          nullable: true
        exactMatch:
          type: boolean
        normalizedMatch:
          type: boolean
        semanticSimilarity:
          type: number
          nullable: true
        semanticPass:
          type: boolean

    EvaluationRunDetail:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/EvaluationRunSummary'
        cases:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationCaseResult'

    PieChartResponse:
      type: object
      properties:
        labels:
          type: array
          items:
            type: string
        values:
          type: array
          items:
            type: integer
            format: int64

    VizGraphNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
          nullable: true
        type:
          type: string
          nullable: true

    VizGraphEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        relation:
          type: string
          nullable: true

    GraphVisualizationResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/VizGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/VizGraphEdge'

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          format: uri
          nullable: true
      additionalProperties: true
