<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>DocuRAG — QA</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; }
        main { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
        .disclaimer { background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem 1rem; margin: 1rem 1.5rem; border-radius: 6px; font-size: 0.9rem; }
        .card { background: #fff; padding: 1rem; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1rem; }
        button { background: #1e3a5f; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        input, textarea { max-width: 40rem; padding: 0.4rem; }
        textarea { width: 100%; min-height: 4rem; }
        pre { background: #f0f2f5; padding: 0.75rem; overflow: auto; font-size: 0.85rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: nav}"></div>
<div th:replace="~{fragments/disclaimer :: disclaimer}"></div>
<main>
    <h1>Question answering</h1>
    <div class="card">
        <form method="post" th:action="@{/qa}">
            <label>Question<br/>
                <textarea name="question" required th:text="${question != null ? question : ''}"></textarea>
            </label><br/><br/>
            <label>Top K <input type="number" name="topK" value="5" th:value="${topK} ?: 5"/></label>
            <label style="margin-left:1rem;">Min score <input type="number" step="0.05" name="minScore" value="0.5" th:value="${minScore} ?: 0.5"/></label>
            <br/><br/>
            <button type="submit">Ask</button>
        </form>
    </div>
    <div class="card" th:if="${ragResult != null}">
        <h2>Answer</h2>
        <p><strong>Model:</strong> <span th:text="${ragResult.model()}">—</span></p>
        <p th:text="${ragResult.answer()}"></p>
        <h3>Retrieved chunks</h3>
        <ul>
            <li th:each="c : ${ragResult.retrievedChunks()}">
                <span th:text="${c.title()}">t</span>
                (score <span th:text="${#numbers.formatDecimal(c.score(), 1, 2)}">0</span>)
                <pre th:text="${c.snippet()}"></pre>
            </li>
        </ul>
    </div>
</main>
</body>
</html>
