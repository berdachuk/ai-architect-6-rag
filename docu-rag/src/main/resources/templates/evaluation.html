<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>DocuRAG — Evaluation</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; }
        main { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
        .disclaimer { background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem 1rem; margin: 1rem 1.5rem; border-radius: 6px; font-size: 0.9rem; }
        table { border-collapse: collapse; width: 100%; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #eef2f7; }
        button { background: #1e3a5f; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .card { background: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        input { padding: 0.35rem; margin-right: 0.5rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: nav}"></div>
<div th:replace="~{fragments/disclaimer :: disclaimer}"></div>
<main>
    <h1>Evaluation</h1>
    <div class="card">
        <h2>Run dataset</h2>
        <form method="post" th:action="@{/evaluation/run}">
            <label>Dataset name
                <input type="text" name="datasetName" value="medical-rag-eval-v1" required/>
            </label><br/><br/>
            <label>Top K <input type="number" name="topK" value="5"/></label>
            <label>Min score <input type="number" step="0.05" name="minScore" value="0.5"/></label>
            <label>Semantic pass ≥ <input type="number" step="0.05" name="semanticPassThreshold" value="0.8"/></label>
            <br/><br/>
            <button type="submit">Run evaluation</button>
        </form>
        <div th:if="${runResult != null}">
            <p>Run <code th:text="${runResult.runId()}"></code> — total <span th:text="${runResult.total()}"></span></p>
            <p>Normalized accuracy: <span th:text="${runResult.normalizedAccuracy()}"></span></p>
            <p>Mean semantic similarity: <span th:text="${runResult.meanSemanticSimilarity()}"></span></p>
            <p>Semantic accuracy @0.80: <span th:text="${runResult.semanticAccuracyAt080()}"></span></p>
        </div>
    </div>
    <div class="card">
        <h2>Recent runs</h2>
        <table>
            <thead>
            <tr>
                <th>Id</th>
                <th>Started</th>
                <th>Norm. acc.</th>
                <th>Mean sem.</th>
                <th>Sem@0.8</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${runs}">
                <td><code th:text="${r.id()}"></code></td>
                <td th:text="${r.startedAt()}">—</td>
                <td th:text="${r.normalizedAccuracy()}">—</td>
                <td th:text="${r.meanSemanticSimilarity()}">—</td>
                <td th:text="${r.semanticAccuracyAt080()}">—</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
