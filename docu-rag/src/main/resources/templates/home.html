<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>DocuRAG — Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; }
        main { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
        .disclaimer { background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem 1rem; margin: 1rem 1.5rem; border-radius: 6px; font-size: 0.9rem; }
        .card { background: #fff; padding: 1rem; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: nav}"></div>
<div th:replace="~{fragments/disclaimer :: disclaimer}"></div>
<main>
    <h1>Dashboard</h1>
    <div class="card">
        <h2>Index</h2>
        <p>Documents: <span th:text="${indexStatus.documentCount()}">0</span></p>
        <p>Chunks: <span th:text="${indexStatus.chunkCount()}">0</span></p>
        <p>Embedded chunks: <span th:text="${indexStatus.embeddedChunkCount()}">0</span></p>
        <p th:if="${indexStatus.lastIngestStatus()}">Last ingest: <span th:text="${indexStatus.lastIngestStatus()}">—</span></p>
    </div>
    <div class="card" th:if="${latestEval != null}">
        <h2>Latest evaluation</h2>
        <p>Run id: <span th:text="${latestEval.summary().id()}">—</span></p>
        <p>Normalized accuracy: <span th:text="${latestEval.summary().normalizedAccuracy()}">—</span></p>
        <p>Mean semantic similarity: <span th:text="${latestEval.summary().meanSemanticSimilarity()}">—</span></p>
    </div>
    <div class="card" th:if="${latestEval == null}">
        <p>No evaluation runs yet. Use the Evaluation page or <code>POST /api/evaluation/run</code>.</p>
    </div>
</main>
</body>
</html>
