<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>DocuRAG — Documents</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; }
        main { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
        .disclaimer { background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem 1rem; margin: 1rem 1.5rem; border-radius: 6px; font-size: 0.9rem; }
        table { border-collapse: collapse; width: 100%; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #eef2f7; }
        button { background: #1e3a5f; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .danger { background: #7f1d1d; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
        .card { background: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .path-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .75rem; align-items: center; }
        .path-input { min-width: 420px; flex: 1 1 420px; padding: .5rem .65rem; border-radius: 4px; border: 1px solid #cbd5e1; }
        .secondary { background: #334155; }
        .progress-track { width: 100%; height: 12px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, #0ea5e9, #16a34a); transition: width .35s ease; }
        .muted { color: #4b5563; font-size: .9rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/common :: nav}"></div>
<main>
    <h1>Documents</h1>
    <div class="card">
        <h2 style="margin-top:0;">Realtime indexing progress</h2>
        <p><strong id="progressPercent"
                   th:text="${indexStatus.chunkCount() > 0 ? T(java.lang.Math).round((indexStatus.embeddedChunkCount() * 100.0) / indexStatus.chunkCount()) : 0} + '%'">0%</strong></p>
        <div class="progress-track" aria-label="Indexing progress">
            <div id="progressFill"
                 class="progress-fill"
                 th:style="'width:' + (${indexStatus.chunkCount() > 0 ? T(java.lang.Math).round((indexStatus.embeddedChunkCount() * 100.0) / indexStatus.chunkCount()) : 0}) + '%'"></div>
        </div>
        <p class="muted" style="margin-top:.5rem;">
            Embedded chunks: <span id="embeddedCount" th:text="${indexStatus.embeddedChunkCount()}">0</span> /
            <span id="chunkCount" th:text="${indexStatus.chunkCount()}">0</span>
        </p>
        <p class="muted">
            Last ingest status: <span id="ingestStatus" th:text="${indexStatus.lastIngestStatus() ?: '—'}">—</span>,
            job: <code id="ingestJobId" th:text="${indexStatus.lastIngestJobId() ?: '—'}">—</code>
        </p>
        <p class="muted">Auto-refresh: every 2 seconds.</p>
        <p class="muted" id="progressMessage">—</p>
    </div>
    <div class="card">
        <p>Total: <span th:text="${total}">0</span></p>
        <form id="setFolderForm" method="post" th:action="@{/documents/set-folder}">
            <input id="selectedIngestPathHidden" type="hidden" name="selectedIngestPath" th:value="${selectedIngestPath}"/>
        </form>
        <form id="folderUploadForm" method="post" th:action="@{/documents/ingest-upload}" enctype="multipart/form-data">        
            <div class="path-row">
                <button class="secondary" id="openFolderDialogBtn" type="button">Choose data folder</button>
                <span id="selectedPathDisplay" class="muted" th:text="${selectedIngestPath}">/path/to/data</span>
            </div>        
            <input id="selectedIngestPathUpload" type="hidden" name="selectedIngestPath" th:value="${selectedIngestPath}"/>
            <input id="folderInput"
                   type="file"
                   name="files"
                   webkitdirectory
                   directory
                   multiple
                   style="display:none"/>
        </form>
        <div class="actions">
            <form method="post" th:action="@{/documents/index/clear-chunks}">
                <input type="hidden" name="page" th:value="${page}"/>
                <button class="danger" type="submit">Full cleanup (remove all docs + chunks)</button>
            </form>
            <form method="post" th:action="@{/documents/ingest}">
                <button type="submit">Ingest configured paths</button>
            </form>
            <button type="submit" form="folderUploadForm">Start ingest</button>
        </div>
        
        <p th:if="${indexActionMessage != null}">
            <strong th:text="${indexActionMessage}">Index action status</strong>
        </p>
        <p th:if="${ingestSummary != null}">
            Job <span th:text="${ingestSummary.jobId()}"></span>:
            <span th:text="${ingestSummary.status()}"></span>,
            loaded <span th:text="${ingestSummary.documentsLoaded()}"></span>,
            skipped <span th:text="${ingestSummary.documentsSkipped()}"></span>
            <span th:if="${ingestSummary.errorMessage()}" th:text="${ingestSummary.errorMessage()}"></span>
        </p>
    </div>
    <table>
        <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Format</th>
            <th>Id</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${documents}">
            <td th:text="${d.title()}">—</td>
            <td th:text="${d.category()}">—</td>
            <td th:text="${d.sourceFormat()}">—</td>
            <td><code th:text="${d.id()}"></code></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${total > 25}">
        <a th:href="@{/documents(page=${page - 1})}" th:if="${page > 0}">Previous</a>
        <a th:href="@{/documents(page=${page + 1})}" th:if="${(page + 1) * 25 < total}">Next</a>
    </p>
</main>
<script>
    (function () {
        let wasRunning = false;

        function toPercent(embedded, chunks) {
            if (!Number.isFinite(embedded) || !Number.isFinite(chunks) || chunks <= 0) {
                return 0;
            }
            return Math.min(100, Math.max(0, Math.round((embedded * 100) / chunks)));
        }

        async function refreshIndexStatus() {
            try {
                const progressResponse = await fetch('/documents/progress', {headers: {'Accept': 'application/json'}});
                if (progressResponse.ok) {
                    const progress = await progressResponse.json();
                    if (progress && progress.running) {
                        wasRunning = true;
                        const embedded = Number(progress.embeddedChunks || 0);
                        const chunks = Number(progress.totalChunksToEmbed || 0);
                        const percent = toPercent(embedded, chunks);
                        document.getElementById('progressPercent').textContent = percent + '%';
                        document.getElementById('progressFill').style.width = percent + '%';
                        document.getElementById('embeddedCount').textContent = String(embedded);
                        document.getElementById('chunkCount').textContent = String(chunks);
                        document.getElementById('ingestStatus').textContent = progress.phase || 'RUNNING';
                        document.getElementById('ingestJobId').textContent = progress.ingestJobId || progress.runId || '—';
                        document.getElementById('progressMessage').textContent = progress.message || 'Ingest/index in progress.';
                        return;
                    }
                }

                const response = await fetch('/api/index/status', {headers: {'Accept': 'application/json'}});
                if (!response.ok) {
                    return;
                }
                const status = await response.json();
                const embedded = Number(status.embeddedChunkCount || 0);
                const chunks = Number(status.chunkCount || 0);
                const percent = toPercent(embedded, chunks);

                document.getElementById('progressPercent').textContent = percent + '%';
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('embeddedCount').textContent = String(embedded);
                document.getElementById('chunkCount').textContent = String(chunks);
                document.getElementById('ingestStatus').textContent = status.lastIngestStatus || '—';
                document.getElementById('ingestJobId').textContent = status.lastIngestJobId || '—';
                document.getElementById('progressMessage').textContent = '—';

                // Refresh list automatically once async ingest/index run has just finished.
                if (wasRunning) {
                    wasRunning = false;
                    window.location.reload();
                }
            } catch (e) {
                // Keep the latest rendered values when polling temporarily fails.
            }
        }

        refreshIndexStatus();
        setInterval(refreshIndexStatus, 2000);

        const folderInput = document.getElementById('folderInput');
        const openFolderDialogBtn = document.getElementById('openFolderDialogBtn');
        const folderUploadForm = document.getElementById('folderUploadForm');
        const selectedIngestPathUpload = document.getElementById('selectedIngestPathUpload');
        const selectedPathDisplay = document.getElementById('selectedPathDisplay');
        function syncSelectedPath(path) {
            if (selectedIngestPathUpload) {
                selectedIngestPathUpload.value = path || '';
            }
            if (selectedPathDisplay) {
                selectedPathDisplay.textContent = path || '';
            }
        }
        if (folderInput && openFolderDialogBtn && folderUploadForm) {
            if (selectedPathDisplay) {
                selectedPathDisplay.textContent = selectedIngestPathUpload?.value || '';
            }
            openFolderDialogBtn.addEventListener('click', async function () {
                try {
                    const response = await fetch('/documents/select-folder', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'},
                        body: ''
                    });
                    if (response.ok) {
                        const payload = await response.json();
                        if (payload && payload.selectedPath) {
                            syncSelectedPath(payload.selectedPath);
                            document.getElementById('setFolderForm').submit();
                            return;
                        }
                        if (payload && payload.cancelled) {
                            return;
                        }
                    }
                } catch (e) {
                    // Fall back to browser folder chooser below.
                }
                folderInput.click();
            });
            folderInput.addEventListener('change', function () {
                if (folderInput.files && folderInput.files.length > 0) {
                    const items = folderInput.files;
                    let path = '';
                    if (items.length > 0) {
                        path = items[0].webkitRelativePath || items[0].name;
                        const idx = path.indexOf('/');
                        if (idx > 0) {
                            path = path.substring(0, idx);
                        }
                    }
                    syncSelectedPath(path);
                    document.getElementById('setFolderForm').submit();
                }
            });
        }
    })();
</script>
</body>
</html>
